server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/opentype;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Static assets — long cache ────────────────────────────────────────
    # Vite fingerprints filenames so these can be cached indefinitely.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend ───────────────────────────────────────────────
    # All REST calls from the frontend go to /matches or /health.
    # The backend container is reachable via its service name "backend"
    # on the internal Docker network.
    location /matches {
        proxy_pass         http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass         http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── WebSocket proxy → backend /ws ─────────────────────────────────────
    # WebSocket connections require the Upgrade and Connection headers to be
    # forwarded. Without them the backend sees a plain HTTP request and
    # refuses the upgrade.
    location /ws {
        proxy_pass         http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS connections alive for up to 1 hour
        proxy_send_timeout 3600s;
    }

    # ── SPA catch-all ─────────────────────────────────────────────────────
    # Every path that isn't a static file or API route is served as
    # index.html so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";  # never cache index.html
    }
}