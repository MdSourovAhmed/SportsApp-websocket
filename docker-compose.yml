# ── Production docker-compose ─────────────────────────────────────────────
# Runs optimised, compiled containers behind an nginx reverse proxy.
# The frontend is a static build served by nginx.
# The backend is a slimmed Node.js image with no devDependencies.
#
# Usage:
#   cp .env.example .env        # set all secrets — especially POSTGRES_PASSWORD
#   docker compose up --build -d
#
# First run only — apply migrations:
#   docker compose exec backend npm run db:migrate
#
# View logs:
#   docker compose logs -f

name: arena-live-prod

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-arena_live}
    # In production the DB port is NOT exposed to the host — only reachable
    # from other containers on the internal "arena_net" network.
    expose:
      - "5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-arena_live}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - arena_net

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    # Not exposed to the host — only nginx can reach it on arena_net
    expose:
      - "7000"
    environment:
      NODE_ENV:     production
      PORT:         7000
      HOST:         0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arena_live}?sslmode=disable
      # CORS is handled by nginx in production so no extra origins needed
      CORS_ORIGINS: http://frontend
      WS_ORIGIN:    ws://frontend
      ARCJET_KEY:   ${ARCJET_KEY:-}
      ARCJET_MODE:  ${ARCJET_MODE:-LIVE}
    networks:
      - arena_net
    # Docker will restart this container up to 3 times before giving up
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Frontend (nginx + static build) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      # Use the "production" stage which compiles React and copies dist to nginx
      target: production
      args:
        # These are baked into the JS bundle at build time by Vite.
        # In production the frontend talks to the same host (nginx proxies it).
        VITE_API_URL:        ${VITE_API_URL:-}
        VITE_WS_URL:         ${VITE_WS_URL:-}
        VITE_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    restart: always
    depends_on:
      - backend
    ports:
      # nginx listens on 80 inside the container; map to host port 80
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - arena_net
    volumes:
      # Mount nginx config so you can update it without rebuilding the image
      - ./nginx/nginx.conf:/etc/nginx/conf.d/app.conf:ro

networks:
  arena_net:
    driver: bridge

volumes:
  postgres_prod_data: